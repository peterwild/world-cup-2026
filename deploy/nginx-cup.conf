# Reverse proxy for cup.ptwconsultingllc.com → the Next server on :3000.
# certbot --nginx adds the 443 server block + redirect on top of this.
#
# No nginx Basic Auth: the app's own login (name + group passcode) is the gate,
# and /api/admin is protected by ADMIN_KEY. Add `auth_basic` here if you want a
# second, site-wide password.
server {
    listen 80;
    server_name cup.ptwconsultingllc.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s; # headroom for streaming Bedrock responses (AI Mode)
    }
}
