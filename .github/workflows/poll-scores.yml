name: Poll World Cup scores

# Pulls results from football-data.org (one API call/run) and pushes them to the
# box. Idempotent and harmless outside the tournament window.
#
# Cron at :09/:29/:49 — three runs/hour at deliberately odd, off-:00 minutes.
# GitHub drops/delays scheduled runs that pile up on round minutes (:00, :15…);
# odd minutes are far more reliable, and running 3×/hour means a dropped run
# self-heals ~20 min later. ~3 calls/hr keeps us deep inside both football-data's
# 10/min limit and GitHub Actions' monthly minutes on the private repo.
on:
  schedule:
    - cron: "9,29,49 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Parse + print results, push nothing"
        required: false
        type: boolean
        default: false
      print_groups:
        description: "Verify the seed draw: print feed groups vs teams.ts"
        required: false
        type: boolean
        default: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24" # native TS type-stripping for the shared lib import

      - name: Poll + push scores
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          if [ "${{ inputs.print_groups }}" = "true" ]; then ARGS="--print-groups"; fi
          node --import ./scripts/ts-ext-resolver.mjs scripts/poll-scores.mjs $ARGS

      # Tell the box to refresh the cached Monte Carlo odds. The endpoint skips
      # the sim when results haven't changed, so triggering every run is cheap.
      # Failure-tolerant: odds are a nice-to-have, scores must still flow.
      - name: Recompute odds
        if: ${{ inputs.dry_run != true && inputs.print_groups != true }}
        continue-on-error: true
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        run: |
          curl -sS --max-time 120 -X POST "$SITE_URL/api/admin/odds" \
            -H "x-admin-key: $ADMIN_KEY"
