name: Poll World Cup scores

# Pulls results from football-data.org and pushes them to the box. Runs often
# during the tournament window; harmless (idempotent) outside it.
on:
  schedule:
    # every 10 min. GitHub crons drift under load — off-:00 minute to dodge it.
    - cron: "3,13,23,33,43,53 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Parse + print results, push nothing"
        required: false
        type: boolean
        default: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24" # native TS type-stripping for the shared lib import

      - name: Poll + push scores
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          node --import ./scripts/ts-ext-resolver.mjs scripts/poll-scores.mjs $ARGS
